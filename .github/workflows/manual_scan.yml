name: Run Video Scanner

on:
  workflow_dispatch:  # Adds a button to run manually

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Create Config File
      run: echo '${{ secrets.SCANNER_CONFIG }}' > config.json

    - name: Run Scanner
      run: python main.py

    - name: Upload Results
      uses: actions/upload-artifact@v4
      with:
        name: video-results
        path: found_videos.csv
